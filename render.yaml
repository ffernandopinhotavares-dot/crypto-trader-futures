services:
  - type: web
    name: crypto-trader-futures
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 22.19.0
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: VITE_APP_ID
        value: cryptotrader
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: OWNER_OPEN_ID
        value: local-owner
